name: Build Lint Gate

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  build-lint-gate:
    name: Build Lint Gate
    runs-on: ubuntu-latest
    env:
      BUILD_ARGS: "--lint-shaders"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r external/presetgen/requirements.txt

      - name: Select build lint mode
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "BUILD_ARGS=--lint-shaders --strict-structure" >> "$GITHUB_ENV"
          elif [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.base_ref }}" = "master" ]; then
            echo "BUILD_ARGS=--lint-shaders --strict-structure" >> "$GITHUB_ENV"
          fi

      - name: Run build lint gate
        run: python build.py $BUILD_ARGS --jobs 1

      - name: Build trimmed output
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: python build-trim.py

      - name: Upload out artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: scanline-classic-out
          path: out/
          retention-days: 14

      - name: Upload out-trim artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: scanline-classic-out-trim
          path: out-trim/
          retention-days: 14
