name: Shader Lint

on:
  pull_request:
  push:

jobs:
  lint-shaders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run shader linter
        run: python scripts/lint_shaders.py
